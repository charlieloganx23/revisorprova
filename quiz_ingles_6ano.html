<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz de Inglês — 6° Ano</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --azul: #1a73e8;
    --azul-escuro: #0d47a1;
    --verde: #2e7d32;
    --verde-claro: #43a047;
    --vermelho: #c62828;
    --amarelo: #f9a825;
    --roxo: #6a1b9a;
    --laranja: #e65100;
    --cinza-bg: #fff4e6;
    --branco: #ffffff;
    --sombra: 0 4px 20px rgba(0,0,0,0.12);
    --radius: 18px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--cinza-bg);
    min-height: 100vh;
    background-image:
      radial-gradient(circle at 10% 20%, rgba(230,81,0,0.08) 0%, transparent 40%),
      radial-gradient(circle at 90% 80%, rgba(67,160,71,0.08) 0%, transparent 40%),
      radial-gradient(circle at 50% 50%, rgba(26,115,232,0.05) 0%, transparent 60%);
  }

  header {
    background: linear-gradient(135deg, #e65100 0%, #43a047 100%);
    color: white;
    text-align: center;
    padding: 2rem 1rem 3rem;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute;
    top: -40px; left: -40px; right: -40px;
    height: 120px;
    background: rgba(255,255,255,0.06);
    border-radius: 50%;
  }
  header .emoji-row {
    font-size: 2.2rem;
    letter-spacing: 0.3rem;
    margin-bottom: 0.5rem;
    animation: bounce 2s infinite;
  }
  @keyframes bounce {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }
  header h1 {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(1.6rem, 5vw, 2.8rem);
    letter-spacing: 0.02em;
    text-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
  header p {
    font-size: 1rem;
    opacity: 0.9;
    margin-top: 0.4rem;
    font-weight: 600;
  }

  /* Navegação entre Quizzes */
  .nav-quizzes {
    display: flex;
    justify-content: center;
    gap: 1rem;
    margin: -1.8rem auto 0;
    padding: 0 1rem;
    max-width: 700px;
    position: relative;
    z-index: 10;
  }
  .nav-btn {
    background: white;
    border: 3px solid #e65100;
    border-radius: 100px;
    padding: 0.6rem 1.5rem;
    font-family: 'Nunito', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    color: #e65100;
    cursor: pointer;
    text-decoration: none;
    display: inline-block;
    box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    transition: all 0.3s;
  }
  .nav-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(230,81,0,0.25);
    background: #e65100;
    color: white;
  }
  .nav-btn.active {
    background: #e65100;
    color: white;
  }

  /* PLACAR */
  .placar-bar {
    display: flex;
    justify-content: center;
    gap: 1rem;
    flex-wrap: wrap;
    margin: 1.4rem auto 0;
    padding: 0 1rem;
    max-width: 700px;
    position: relative;
    z-index: 10;
  }
  .placar-card {
    background: white;
    border-radius: 14px;
    padding: 0.6rem 1.4rem;
    box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    text-align: center;
    min-width: 110px;
  }
  .placar-card .label {
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #777;
  }
  .placar-card .valor {
    font-family: 'Fredoka One', cursive;
    font-size: 1.8rem;
    line-height: 1.1;
  }
  .placar-card.pontos .valor { color: var(--laranja); }
  .placar-card.acertos .valor { color: var(--verde-claro); }
  .placar-card.erros .valor { color: var(--vermelho); }
  .placar-card.estrelas .valor { color: var(--amarelo); }

  /* PROGRESSO */
  .progresso-wrap {
    max-width: 700px;
    margin: 1.6rem auto 0;
    padding: 0 1.2rem;
  }
  .progresso-texto {
    display: flex;
    justify-content: space-between;
    font-size: 0.85rem;
    font-weight: 700;
    color: #555;
    margin-bottom: 0.4rem;
  }
  .barra-bg {
    background: #dce3f7;
    border-radius: 100px;
    height: 14px;
    overflow: hidden;
  }
  .barra-fill {
    height: 100%;
    background: linear-gradient(90deg, #e65100, #43a047);
    border-radius: 100px;
    transition: width 0.6s ease;
    width: 0%;
  }

  /* TEMAS */
  .temas-lista {
    max-width: 700px;
    margin: 1.2rem auto 0;
    padding: 0 1.2rem;
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
    justify-content: center;
  }
  .tema-badge {
    font-size: 0.7rem;
    font-weight: 700;
    padding: 0.25rem 0.7rem;
    border-radius: 100px;
    background: white;
    color: #e65100;
    border: 2px solid #ffd7c2;
    transition: all 0.3s;
  }
  .tema-badge.visto { background: #e65100; color: white; border-color: #e65100; }
  .tema-badge.atual { background: #43a047; color: white; border-color: #43a047; animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.06);} }

  /* QUIZ AREA */
  .quiz-area {
    max-width: 700px;
    margin: 1.4rem auto 2rem;
    padding: 0 1rem;
  }

  .cartao {
    background: white;
    border-radius: var(--radius);
    box-shadow: var(--sombra);
    padding: 1.8rem 1.6rem 1.4rem;
    animation: slideIn 0.4s ease;
    position: relative;
    overflow: hidden;
  }
  @keyframes slideIn {
    from { opacity:0; transform: translateY(20px); }
    to   { opacity:1; transform: translateY(0); }
  }
  .cartao::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 5px;
    background: linear-gradient(90deg, #e65100, #43a047);
  }

  .num-pergunta {
    font-size: 0.75rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #e65100;
    margin-bottom: 0.6rem;
  }
  .tema-tag {
    display: inline-block;
    font-size: 0.7rem;
    font-weight: 700;
    padding: 0.2rem 0.7rem;
    border-radius: 100px;
    margin-bottom: 0.8rem;
  }
  .pontos-tag {
    float: right;
    font-size: 0.75rem;
    font-weight: 800;
    color: var(--amarelo);
    background: #fff8e1;
    border: 2px solid #ffe082;
    border-radius: 100px;
    padding: 0.2rem 0.7rem;
  }

  .enunciado {
    font-size: 1.08rem;
    font-weight: 700;
    color: #1a1a2e;
    line-height: 1.55;
    margin-bottom: 1.2rem;
  }
  .enunciado .destaque {
    background: linear-gradient(135deg, #fff3e0, #e8f5e9);
    border-left: 4px solid #e65100;
    border-radius: 0 8px 8px 0;
    padding: 0.5rem 0.8rem;
    margin: 0.6rem 0;
    font-style: italic;
    font-size: 0.95rem;
    color: #444;
    display: block;
  }
  .enunciado .exemplo {
    background: #e3f2fd;
    border-left: 4px solid #1a73e8;
    border-radius: 0 8px 8px 0;
    padding: 0.5rem 0.8rem;
    margin: 0.6rem 0;
    font-style: italic;
    font-size: 0.9rem;
    color: #333;
    display: block;
  }

  .opcoes { display: flex; flex-direction: column; gap: 0.65rem; }

  .opcao-btn {
    display: flex;
    align-items: center;
    gap: 0.8rem;
    padding: 0.75rem 1rem;
    border-radius: 12px;
    border: 2.5px solid #ffd7c2;
    background: #fffbf6;
    cursor: pointer;
    font-family: 'Nunito', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    color: #333;
    text-align: left;
    transition: all 0.2s;
  }
  .opcao-btn:hover:not(:disabled) {
    border-color: #e65100;
    background: #fff3e0;
    transform: translateX(4px);
  }
  .opcao-btn .letra {
    width: 30px; height: 30px;
    border-radius: 50%;
    background: #e65100;
    color: white;
    font-family: 'Fredoka One', cursive;
    font-size: 0.95rem;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
  }
  .opcao-btn.correta {
    border-color: var(--verde-claro);
    background: #e8f5e9;
    animation: acerto 0.4s ease;
  }
  .opcao-btn.correta .letra { background: var(--verde-claro); }
  @keyframes acerto {
    0% { transform: scale(1); }
    50% { transform: scale(1.04); }
    100% { transform: scale(1); }
  }
  .opcao-btn.errada {
    border-color: var(--vermelho);
    background: #ffebee;
  }
  .opcao-btn.errada .letra { background: var(--vermelho); }
  .opcao-btn:disabled { cursor: default; }

  /* FEEDBACK */
  .feedback {
    margin-top: 1rem;
    padding: 0.9rem 1rem;
    border-radius: 12px;
    font-size: 0.9rem;
    font-weight: 700;
    display: none;
    align-items: flex-start;
    gap: 0.6rem;
    line-height: 1.5;
  }
  .feedback.show { display: flex; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
  .feedback.ok { background: #e8f5e9; color: var(--verde); border: 2px solid #a5d6a7; }
  .feedback.nok { background: #ffebee; color: var(--vermelho); border: 2px solid #ef9a9a; }
  .feedback-icon { font-size: 1.4rem; flex-shrink: 0; }

  .btn-proximo {
    display: block;
    margin: 1.2rem auto 0;
    padding: 0.8rem 2.2rem;
    border-radius: 100px;
    border: none;
    background: linear-gradient(135deg, #e65100, #43a047);
    color: white;
    font-family: 'Fredoka One', cursive;
    font-size: 1.1rem;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(230,81,0,0.35);
    transition: all 0.2s;
    display: none;
  }
  .btn-proximo:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(230,81,0,0.45); }
  .btn-proximo.show { display: block; }

  /* RESULTADO FINAL */
  .resultado {
    display: none;
    background: white;
    border-radius: var(--radius);
    box-shadow: var(--sombra);
    padding: 2rem 1.6rem;
    text-align: center;
    animation: slideIn 0.5s ease;
  }
  .resultado.show { display: block; }
  .resultado h2 {
    font-family: 'Fredoka One', cursive;
    font-size: 2rem;
    color: #e65100;
    margin-bottom: 0.5rem;
  }
  .resultado .medalha {
    font-size: 5rem;
    display: block;
    margin: 1rem 0;
    animation: spin 0.8s ease;
  }
  @keyframes spin { from{transform:rotateY(0)} to{transform:rotateY(360deg)} }
  .resultado .placar-final {
    font-size: 3rem;
    font-family: 'Fredoka One', cursive;
    color: #e65100;
    margin: 0.5rem 0;
  }
  .resultado .mensagem {
    font-size: 1.05rem;
    font-weight: 700;
    color: #444;
    margin: 0.5rem 0 1.4rem;
    line-height: 1.5;
  }
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0.8rem;
    margin-bottom: 1.4rem;
  }
  .stat-box {
    background: var(--cinza-bg);
    border-radius: 12px;
    padding: 0.7rem;
  }
  .stat-box .s-num {
    font-family: 'Fredoka One', cursive;
    font-size: 1.8rem;
  }
  .stat-box .s-label { font-size: 0.72rem; font-weight: 700; color: #666; text-transform: uppercase; }
  .btn-reiniciar {
    padding: 0.85rem 2.5rem;
    border-radius: 100px;
    border: none;
    background: linear-gradient(135deg, #e65100, #43a047);
    color: white;
    font-family: 'Fredoka One', cursive;
    font-size: 1.15rem;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(230,81,0,0.35);
    transition: all 0.2s;
  }
  .btn-reiniciar:hover { transform: translateY(-2px); }

  /* Partículas de confete */
  .confete { position: fixed; pointer-events: none; z-index: 9999; }
  .confete span {
    position: absolute;
    width: 10px; height: 10px;
    border-radius: 2px;
    animation: cair linear forwards;
  }
  @keyframes cair {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }
</style>
</head>
<body>

<header>
  <div class="emoji-row">🇬🇧 👋 🌍 💬 ✨</div>
  <h1>English Quiz - Greetings</h1>
  <p>6° Ano — Cumprimentos em Inglês</p>
</header>

<div class="nav-quizzes">
  <a href="quiz_portugues_6ano.html" class="nav-btn">📚 Português</a>
  <a href="quiz_ingles_6ano.html" class="nav-btn active">🇬🇧 English</a>
</div>

<div class="placar-bar">
  <div class="placar-card pontos">
    <div class="label">⭐ Points</div>
    <div class="valor" id="totalPontos">0</div>
  </div>
  <div class="placar-card acertos">
    <div class="label">✅ Corretos</div>
    <div class="valor" id="totalAcertos">0</div>
  </div>
  <div class="placar-card erros">
    <div class="label">❌ Erros</div>
    <div class="valor" id="totalErros">0</div>
  </div>
  <div class="placar-card estrelas">
    <div class="label">🏅 Estrelas</div>
    <div class="valor" id="totalEstrelas">—</div>
  </div>
</div>

<div class="progresso-wrap">
  <div class="progresso-texto">
    <span id="progressoTexto">Question 1 of 30</span>
    <span id="pct">0%</span>
  </div>
  <div class="barra-bg"><div class="barra-fill" id="barraFill"></div></div>
</div>

<div class="temas-lista" id="temasLista"></div>

<div class="quiz-area">
  <div class="cartao" id="cartao">
    <div class="num-pergunta" id="numPergunta"></div>
    <span class="pontos-tag" id="pontosTag"></span>
    <span class="tema-tag" id="temaTag"></span>
    <div class="enunciado" id="enunciado"></div>
    <div class="opcoes" id="opcoes"></div>
    <div class="feedback" id="feedback">
      <span class="feedback-icon" id="feedbackIcon"></span>
      <span id="feedbackTexto"></span>
    </div>
    <button class="btn-proximo" id="btnProximo" onclick="proximaPergunta()">Next →</button>
  </div>
  <div class="resultado" id="resultado">
    <h2>Quiz Completed! 🎉</h2>
    <span class="medalha" id="medalha"></span>
    <div class="placar-final" id="placarFinal"></div>
    <div class="mensagem" id="msgFinal"></div>
    <div class="stats-grid">
      <div class="stat-box"><div class="s-num" style="color:var(--verde-claro)" id="rAcertos">0</div><div class="s-label">Corretos</div></div>
      <div class="stat-box"><div class="s-num" style="color:var(--vermelho)" id="rErros">0</div><div class="s-label">Erros</div></div>
      <div class="stat-box"><div class="s-num" style="color:var(--amarelo)" id="rEstrelas">—</div><div class="s-label">Estrelas</div></div>
    </div>
    <button class="btn-reiniciar" onclick="reiniciar()">🔄 Jogar Novamente</button>
  </div>
</div>

<div class="confete" id="confete"></div>

<script>
const perguntas = [
  {
    tema: "Cumprimentos Básicos",
    temaColor: "#e65100",
    pontos: 10,
    enunciado: "Qual é o cumprimento mais comum usado em inglês a qualquer hora do dia?",
    opcoes: ["Good night", "Hello", "Goodbye", "Good afternoon"],
    correta: 1,
    feedback: "✅ Correto! <strong>Hello</strong> é o cumprimento universal em inglês, usado a qualquer momento do dia e em situações formais ou informais."
  },
  {
    tema: "Cumprimentos por Período",
    temaColor: "#43a047",
    pontos: 10,
    enunciado: "Qual cumprimento você deve usar quando encontra alguém de manhã?",
    opcoes: ["Good evening", "Good morning", "Good night", "Good afternoon"],
    correta: 1,
    feedback: "✅ Muito bem! <strong>Good morning</strong> é usado do amanhecer até o meio-dia (aproximadamente até 12h)."
  },
  {
    tema: "Cumprimentos por Período",
    temaColor: "#43a047",
    pontos: 10,
    enunciado: "Se são 3 horas da tarde e você encontra um professor, o que você diz?",
    opcoes: ["Good morning", "Good afternoon", "Good evening", "Good night"],
    correta: 1,
    feedback: "✅ Perfeito! <strong>Good afternoon</strong> é usado do meio-dia até aproximadamente 18h (6 da tarde)."
  },
  {
    tema: "Cumprimentos por Período",
    temaColor: "#43a047",
    pontos: 10,
    enunciado: "Qual é a diferença entre <em>\"Good evening\"</em> e <em>\"Good night\"</em>?",
    opcoes: [
      "São sinônimos, significam a mesma coisa",
      "Good evening é cumprimento; Good night é despedida",
      "Good night é cumprimento; Good evening é despedida",
      "Ambos são apenas despedidas"
    ],
    correta: 1,
    feedback: "✅ Excelente! <strong>Good evening</strong> é usado para cumprimentar alguém à noite (após 18h). <strong>Good night</strong> é usado apenas para se despedir antes de dormir!"
  },
  {
    tema: "Cumprimentos Informais",
    temaColor: "#1a73e8",
    pontos: 10,
    enunciado: "Qual cumprimento informal você usaria com amigos?",
    opcoes: ["Good morning, sir", "How do you do?", "Hi! / Hey!", "Good evening, madam"],
    correta: 2,
    feedback: "✅ Isso mesmo! <strong>Hi</strong> e <strong>Hey</strong> são cumprimentos informais, perfeitos para usar com amigos, colegas e pessoas próximas!"
  },
  {
    tema: "Cumprimentos Formais",
    temaColor: "#6a1b9a",
    pontos: 15,
    enunciado: "Em uma entrevista de emprego, qual é o cumprimento mais adequado?",
    opcoes: [
      "Hey, what's up?",
      "Good morning/afternoon. Nice to meet you.",
      "Yo!",
      "Hi there, buddy!"
    ],
    correta: 1,
    feedback: "✅ Perfeito! Em situações formais como entrevistas, use <strong>Good morning/afternoon</strong> seguido de <strong>Nice to meet you</strong> (Prazer em conhecê-lo)."
  },
  {
    tema: "Como Está Você?",
    temaColor: "#c62828",
    pontos: 10,
    enunciado: "Qual é a forma mais comum de perguntar 'Como você está?' em inglês?",
    opcoes: ["What's your name?", "How are you?", "Where are you from?", "How old are you?"],
    correta: 1,
    feedback: "✅ Muito bem! <strong>How are you?</strong> é a forma mais comum de perguntar como alguém está. É educado perguntar isso após cumprimentar!"
  },
  {
    tema: "Respostas a Cumprimentos",
    temaColor: "#827717",
    pontos: 10,
    enunciado: "Alguém diz <em>\"How are you?\"</em>. Qual é uma resposta adequada?",
    opcoes: [
      "My name is John",
      "I'm fine, thank you. And you?",
      "I'm 12 years old",
      "Nice to meet you"
    ],
    correta: 1,
    feedback: "✅ Correto! <strong>I'm fine, thank you. And you?</strong> é uma resposta educada e completa. Você responde e devolve a pergunta!"
  },
  {
    tema: "Respostas a Cumprimentos",
    temaColor: "#827717",
    pontos: 15,
    enunciado: "Quais são outras formas de responder <em>\"How are you?\"</em> positivamente?",
    opcoes: [
      "I'm terrible / I'm awful",
      "I'm great! / I'm very well! / I'm doing good!",
      "Goodbye / See you later",
      "What's up? / Hey!"
    ],
    correta: 1,
    feedback: "✅ Excelente! Você pode variar suas respostas: <strong>I'm great!</strong> (Estou ótimo!), <strong>I'm very well!</strong> (Estou muito bem!), <strong>I'm doing good!</strong> (Estou indo bem!)."
  },
  {
    tema: "Cumprimentos Informais",
    temaColor: "#1a73e8",
    pontos: 10,
    enunciado: "O que significa a expressão informal <em>\"What's up?\"</em>?",
    opcoes: [
      "O que está em cima?",
      "Como você está? / E aí?",
      "Qual é seu nome?",
      "Onde você mora?"
    ],
    correta: 1,
    feedback: "✅ Isso mesmo! <strong>What's up?</strong> é uma forma muito informal de perguntar 'Como você está?' ou 'E aí?'. Use só com amigos!"
  },
  {
    tema: "Despedidas",
    temaColor: "#bf360c",
    pontos: 10,
    enunciado: "Qual é a despedida mais comum em inglês?",
    opcoes: ["Hello", "Good morning", "Goodbye / Bye", "How are you?"],
    correta: 2,
    feedback: "✅ Correto! <strong>Goodbye</strong> (ou <strong>Bye</strong>, mais informal) é a despedida mais comum em inglês!"
  },
  {
    tema: "Despedidas",
    temaColor: "#bf360c",

const temas = [...new Set(perguntas.map(p => p.tema))];
let atual = 0, pontos = 0, acertos = 0, erros = 0, respondeu = false;

function init() {
  const tl = document.getElementById('temasLista');
  tl.innerHTML = temas.map((t, i) => `<span class="tema-badge" id="badge-${i}">${t}</span>`).join('');
  renderPergunta();
}

function atualizarBadges() {
  temas.forEach((t, i) => {
    const badge = document.getElementById(`badge-${i}`);
    badge.className = 'tema-badge';
    const pergAtual = perguntas[atual];
    if (pergAtual && pergAtual.tema === t) badge.classList.add('atual');
    else if (perguntas.slice(0, atual).some(p => p.tema === t)) badge.classList.add('visto');
  });
}

function renderPergunta() {
  if (atual >= perguntas.length) { mostrarResultado(); return; }
  respondeu = false;
  const p = perguntas[atual];
  const letras = ['A', 'B', 'C', 'D'];

  document.getElementById('numPergunta').textContent = `Question ${atual + 1} of ${perguntas.length}`;
  document.getElementById('pontosTag').textContent = `⭐ ${p.pontos} pts`;
  const tt = document.getElementById('temaTag');
  tt.textContent = p.tema;
  tt.style.background = p.temaColor + '20';
  tt.style.color = p.temaColor;
  tt.style.border = `2px solid ${p.temaColor}40`;
  document.getElementById('enunciado').innerHTML = p.enunciado;

  const opcDiv = document.getElementById('opcoes');
  opcDiv.innerHTML = p.opcoes.map((op, i) =>
    `<button class="opcao-btn" onclick="responder(${i})">
      <span class="letra">${letras[i]}</span>
      <span>${op}</span>
    </button>`
  ).join('');

  document.getElementById('feedback').className = 'feedback';
  document.getElementById('btnProximo').className = 'btn-proximo';

  const pct = Math.round((atual / perguntas.length) * 100);
  document.getElementById('barraFill').style.width = pct + '%';
  document.getElementById('progressoTexto').textContent = `Question ${atual + 1} of ${perguntas.length}`;
  document.getElementById('pct').textContent = pct + '%';

  atualizarBadges();
}

function responder(idx) {
  if (respondeu) return;
  respondeu = true;
  const p = perguntas[atual];
  const bots = document.querySelectorAll('.opcao-btn');
  bots.forEach(b => b.disabled = true);
  bots[idx].classList.add(idx === p.correta ? 'correta' : 'errada');
  if (idx !== p.correta) bots[p.correta].classList.add('correta');

  const fb = document.getElementById('feedback');
  const fi = document.getElementById('feedbackIcon');
  const ft = document.getElementById('feedbackTexto');

  if (idx === p.correta) {
    pontos += p.pontos; acertos++;
    fb.className = 'feedback show ok';
    fi.textContent = '🎉';
    ft.innerHTML = p.feedback;
    confete();
  } else {
    erros++;
    fb.className = 'feedback show nok';
    fi.textContent = '💡';
    ft.innerHTML = `❌ Ops! A resposta correta é a <strong>${['A','B','C','D'][p.correta]}</strong>. <br>${p.feedback.replace('✅','📖')}`;
  }

  document.getElementById('totalPontos').textContent = pontos;
  document.getElementById('totalAcertos').textContent = acertos;
  document.getElementById('totalErros').textContent = erros;
  document.getElementById('totalEstrelas').textContent = getEstrelas(pontos);
  document.getElementById('btnProximo').className = 'btn-proximo show';
}

function getEstrelas(pts) {
  const max = perguntas.reduce((s, p) => s + p.pontos, 0);
  const pct = pts / max;
  if (pct >= 0.9) return '⭐⭐⭐';
  if (pct >= 0.6) return '⭐⭐';
  if (pct >= 0.3) return '⭐';
  return '0';
}

function getMedalha(pts) {
  const max = perguntas.reduce((s, p) => s + p.pontos, 0);
  const pct = pts / max;
  if (pct >= 0.9) return '🏆';
  if (pct >= 0.7) return '🥇';
  if (pct >= 0.5) return '🥈';
  if (pct >= 0.3) return '🥉';
  return '📚';
}

function getMensagem(pts) {
  const max = perguntas.reduce((s, p) => s + p.pontos, 0);
  const pct = pts / max;
  if (pct >= 0.9) return 'Amazing! You\'re an English greetings expert! Keep it up! 🌟';
  if (pct >= 0.7) return 'Very good! You know the main greetings. Review what you missed! 💪';
  if (pct >= 0.5) return 'Good job! You\'re on the right track. Study a bit more! 📖';
  if (pct >= 0.3) return 'You\'re learning! Review the content and try again! 🎯';
  return 'Don\'t give up! Study the material and try again. Practice makes perfect! 📚';
}

function proximaPergunta() {
  atual++;
  if (atual >= perguntas.length) { mostrarResultado(); return; }
  document.getElementById('cartao').style.animation = 'none';
  setTimeout(() => {
    document.getElementById('cartao').style.animation = 'slideIn 0.4s ease';
    renderPergunta();
  }, 50);
}

function mostrarResultado() {
  document.getElementById('cartao').style.display = 'none';
  const r = document.getElementById('resultado');
  r.className = 'resultado show';
  document.getElementById('medalha').textContent = getMedalha(pontos);
  const max = perguntas.reduce((s, p) => s + p.pontos, 0);
  document.getElementById('placarFinal').textContent = `${pontos} / ${max} points`;
  document.getElementById('msgFinal').innerHTML = getMensagem(pontos);
  document.getElementById('rAcertos').textContent = acertos;
  document.getElementById('rErros').textContent = erros;
  document.getElementById('rEstrelas').textContent = getEstrelas(pontos);
  const max2 = perguntas.reduce((s, p) => s + p.pontos, 0);
  if (pontos / max2 >= 0.7) confete(80);

  document.getElementById('barraFill').style.width = '100%';
  document.getElementById('progressoTexto').textContent = 'Quiz completed!';
  document.getElementById('pct').textContent = '100%';
}

function reiniciar() {
  atual = 0; pontos = 0; acertos = 0; erros = 0;
  document.getElementById('totalPontos').textContent = 0;
  document.getElementById('totalAcertos').textContent = 0;
  document.getElementById('totalErros').textContent = 0;
  document.getElementById('totalEstrelas').textContent = '—';
  document.getElementById('cartao').style.display = '';
  document.getElementById('resultado').className = 'resultado';
  renderPergunta();
}

function confete(qtd = 30) {
  const el = document.getElementById('confete');
  el.innerHTML = '';
  const cores = ['#e65100','#43a047','#1a73e8','#f9a825','#c62828','#6a1b9a','#fff'];
  for (let i = 0; i < qtd; i++) {
    const s = document.createElement('span');
    s.style.left = Math.random() * 100 + 'vw';
    s.style.top = '-20px';
    s.style.background = cores[Math.floor(Math.random() * cores.length)];
    s.style.width = (8 + Math.random() * 8) + 'px';
    s.style.height = (8 + Math.random() * 8) + 'px';
    s.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    s.style.animationDuration = (1.5 + Math.random() * 2) + 's';
    s.style.animationDelay = Math.random() * 0.5 + 's';
    el.appendChild(s);
  }
  setTimeout(() => { el.innerHTML = ''; }, 3500);
}
